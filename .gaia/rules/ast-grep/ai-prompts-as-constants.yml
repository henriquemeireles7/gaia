id: ai-prompts-as-constants
language: TypeScript
files:
  - 'apps/api/features/**/*.ts'
  - 'apps/api/server/**/*.ts'
ignores:
  - '**/*.test.ts'
  - '**/prompts.ts'
rule:
  pattern: 'system: "$LITERAL"'
  inside:
    stopBy: end
    pattern: complete($$$)
message: |
  System prompts live as TypeScript constants in
  apps/api/server/<feature>/prompts.ts (rule ai/prompts-as-constants).
  Inline string literals defeat versioning, evals, and shared edits.
  See .gaia/reference/ai.md.
severity: error
