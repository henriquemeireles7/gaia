name: CI

on:
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: lint + typecheck + harden + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Lint + Typecheck + Harden + Test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          NODE_ENV: test
          BETTER_AUTH_SECRET: test-secret-min-32-chars-for-ci-validation
          POLAR_ACCESS_TOKEN: polar_test_ci_placeholder
          POLAR_WEBHOOK_SECRET: polar_whsec_test_ci_placeholder
          POLAR_PRODUCT_ID: prod_test_ci_placeholder
          RESEND_API_KEY: re_test_ci_placeholder
          ANTHROPIC_API_KEY: sk-ant-test_ci_placeholder
          PUBLIC_APP_URL: http://localhost:3000
        run: bun run check

  secrets:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deps:
    name: osv-scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action/osv-scanner-action@v1
        with:
          scan-args: |
            --recursive
            --skip-git
            ./

  dead-code:
    name: knip (production)
    runs-on: ubuntu-latest
    env:
      # Knip loads drizzle.config.ts and packages/config/env.ts which throw
      # on missing required env. Provide CI placeholders so knip can run.
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      BETTER_AUTH_SECRET: test-secret-min-32-chars-for-ci-validation
      POLAR_ACCESS_TOKEN: polar_test_ci_placeholder
      POLAR_WEBHOOK_SECRET: polar_whsec_test_ci_placeholder
      POLAR_PRODUCT_ID: prod_test_ci_placeholder
      RESEND_API_KEY: re_test_ci_placeholder
      ANTHROPIC_API_KEY: sk-ant-test_ci_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx knip --reporter compact
