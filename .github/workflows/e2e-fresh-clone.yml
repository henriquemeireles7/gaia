name: e2e-fresh-clone

# AD-AP-6: matrix CI gate proving the scaffolder + cli dispatcher work on
# both ubuntu-latest and macos-latest. Live-deploy assertions are gated to
# the nightly run via GAIA_E2E_LIVE=1.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Nightly with GAIA_E2E_LIVE=1.
    - cron: '0 6 * * *'

jobs:
  fresh-clone:
    name: scaffold → verify → explain (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.2.x'

      - name: install
        run: bun install --frozen-lockfile

      - name: e2e fresh clone
        env:
          GAIA_E2E_LIVE: ${{ github.event_name == 'schedule' && '1' || '0' }}
        run: bun scripts/e2e-fresh-clone.ts

      - name: env example parity
        run: bun scripts/check-env-example-parity.ts

      - name: state.json no-secrets gate
        run: bun scripts/check-state-json-no-secrets.ts
