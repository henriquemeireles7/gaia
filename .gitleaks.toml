# gitleaks config — vision §Security
# https://github.com/gitleaks/gitleaks

title = "Gaia gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Files where placeholder secrets are intentional"
paths = [
  '''\.env\.example$''',
  '''\.github/workflows/ci\.yml$''',
  '''packages/security/.+\.test\.ts$''',
]

# Permit obviously-fake test secrets used in unit tests.
regexes = [
  '''sk-ant-test_ci_placeholder''',
  '''re_test_ci_placeholder''',
  '''polar_test_ci_placeholder''',
  '''polar_whsec_test_ci_placeholder''',
  '''prod_test_ci_placeholder''',
  '''test-secret-min-32-chars-for-ci-validation''',
  '''test-secret-min-32-chars-for-validation-pad''',
  '''polar_test_token''',
  '''polar_whsec_test''',
  '''product_test_123''',
  '''sk-ant-test-key''',
  '''re_test_key''',
]
