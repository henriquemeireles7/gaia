# gitleaks config — vision §Security
# https://github.com/gitleaks/gitleaks

title = "Gaia gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Files where placeholder secrets are intentional"
paths = [
  '''\.env\.example$''',
  '''\.github/workflows/ci\.yml$''',
  '''packages/security/.+\.test\.ts$''',
  # CLAUDE.md anti-pattern examples are documentation, not real secrets.
  # Fix-forward in the same branch is impossible because gitleaks scans
  # the full diff range — a historical commit can't be edited without
  # rewriting history.
  '''packages/.+/CLAUDE\.md$''',
]

# Permit obviously-fake test secrets used in unit tests.
regexes = [
  '''sk-ant-test_ci_placeholder''',
  '''re_test_ci_placeholder''',
  '''polar_test_ci_placeholder''',
  '''polar_whsec_test_ci_placeholder''',
  '''prod_test_ci_placeholder''',
  '''test-secret-min-32-chars-for-ci-validation''',
  '''test-secret-min-32-chars-for-validation-pad''',
  '''polar_test_token''',
  '''polar_whsec_test''',
  '''product_test_123''',
  '''sk-ant-test-key''',
  '''re_test_key''',
  '''polar_secret_abc123''',
]

# Known false-positive fingerprints. Each entry MUST cite the diff and
# why the literal is not a real secret.
[[allowlist.fingerprints]]
fingerprint = "754e0dd9390324b77b017af0a7c2b4e1dfec71dc:packages/security/CLAUDE.md:generic-api-key:572"
description = "Placeholder string in an anti-pattern example showing how NOT to hardcode secrets. Replaced with `<paste-your-secret-here>` in commit 2ca5ef9; this entry pins the historical false positive."
