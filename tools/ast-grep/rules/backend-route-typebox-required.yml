id: backend-route-typebox-required
language: TypeScript
files:
  - 'apps/api/features/**/routes.ts'
  - 'apps/api/features/**/*.routes.ts'
rule:
  any:
    - pattern: $APP.post($PATH, $HANDLER)
    - pattern: $APP.put($PATH, $HANDLER)
    - pattern: $APP.patch($PATH, $HANDLER)
    - pattern: $APP.delete($PATH, $HANDLER)
message: |
  Mutating Elysia routes (POST/PUT/PATCH/DELETE) must declare a TypeBox
  schema as the third argument: `.post(path, handler, { body: T.Object({...}) })`
  (rule backend/route-typebox-required). Pass-through with only a handler
  skips edge validation. See .gaia/reference/backend.md.
severity: error
